name: Publish

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Zip the project
        run: zip -r "Reverie Beta ${{ github.event.release.tag_name }}.zip" shaders/ LICENSE

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- Project Configuration ---
          modrinth-id: frac8sks
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1248172
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          
          # --- Release Metadata (Pulled automatically from GitHub Release) ---
          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}
          
          # --- Mod Configuration ---
          version-type: release
          loaders: |
            iris
          game-versions: |
            >=1.21
          
          # --- File Upload ---
          files: "Reverie Beta ${{ github.event.release.tag_name }}.zip"

          retry-attempts: 0
