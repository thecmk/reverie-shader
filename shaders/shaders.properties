uniform.vec2.resolution=vec2(viewWidth, viewHeight)
uniform.vec2.resolutionInv=vec2(1.0/viewWidth, 1.0/viewHeight)

variable.float.gr=1.32471795724474602596

#if AA_MODE == 1
uniform.vec2.taaJitter=if(frameCounter%2 == 0, vec2(0.25 / viewWidth, -0.25 / viewHeight), vec2(-0.25 / viewWidth, 0.25 / viewHeight))
#elif AA_MODE == 2
variable.float.jitterX=frac(0.5 + frameCounter / gr) * 2 - 1
variable.float.jitterY=frac(0.5 + frameCounter / (gr*gr)) * 2 - 1
uniform.vec2.taaJitter=vec2(jitterX/viewWidth, jitterY/viewHeight)
#else
uniform.vec2.taaJitter=vec2(0, 0)
#endif

variable.float.sunL=1/sqrt(sunPosition.x*sunPosition.x+sunPosition.y*sunPosition.y+sunPosition.z*sunPosition.z)
uniform.vec3.sunPosN=vec3(sunPosition.x*sunL, sunPosition.y*sunL, sunPosition.z*sunL)
variable.float.slpL=1/sqrt(shadowLightPosition.x*shadowLightPosition.x+shadowLightPosition.y*shadowLightPosition.y+shadowLightPosition.z*shadowLightPosition.z)
uniform.vec3.sLightPosN=vec3(shadowLightPosition.x*slpL, shadowLightPosition.y*slpL, shadowLightPosition.z*slpL)

uniform.float.isOutdoorsSmooth=smooth(if(eyeBrightness.y > 50, 1, 0), 15, 6)

uniform.float.precipitationSmooth=smooth(biome_precipitation, 150, 150)

# Randomize the clouds every time the shader is reloaded
#ifdef SCREENSHOT_MODE
variable.float.randomFloat=0.5
#else
variable.float.randomFloat=smooth(random(), 2147483647, 2147483647)
#endif
variable.float.randomA=frac(randomFloat * 20 + 1.61803398875)
variable.float.randomB=frac(randomFloat * 60 + 1.61803398875 * 2)

# 0 - Spring, 3 - Winter
variable.float.worldDayMod=worldDay%120
variable.int.season=floor(worldDayMod / 30.0)
variable.float.seasonHumidity=if(season == 0, 1, if(season == 1, 0, if(season == 2, 3, -2)))
variable.float.humidity=smooth(seasonHumidity * 0.5 + rainfall * rainfall * 1.5, 30, 30)

uniform.float.cloudStartOffset=(randomB * 2 - 1) * 10000
uniform.float.cloudCoverageVl=max(1, 4 + 4 * randomFloat - 4 * rainStrength - 2 * thunderStrength - humidity * 0.7)
uniform.float.cloudCoverageFlat=4 + 6 * (randomA)

uniform.float.fogAmount=max(0, (1 - randomA) + rainStrength * 3 + thunderStrength * 3 + humidity - 1)
uniform.float.anisotropy=0.75 + 0.15 * randomB - 0.25 * rainStrength - 0.1 * thunderStrength

uniform.float.betaRfact=0.8 + randomB * 0.4

variable.float.randBSigned=randomB * 2 - 1
uniform.vec2.windDirection=vec2(randBSigned, sqrt(1 - randBSigned * randBSigned))

